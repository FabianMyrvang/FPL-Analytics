name: Update FPL data

on:
  workflow_dispatch:        # manual "Run workflow" button — runs regardless of season
  schedule:
    # Daily at 06:00 UTC. The season-guard step skips the June/July off-season,
    # so the schedule effectively wakes up on its own each August.
    - cron: "0 6 * * *"

permissions:
  contents: write           # allow the bot to commit refreshed data back to the repo

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Season guard (skip off-season unless triggered manually)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding regardless of season."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            m=$(date -u +%m)
            if [ "$m" = "06" ] || [ "$m" = "07" ]; then
              echo "Off-season (month $m) — skipping scheduled run."
              echo "run=false" >> "$GITHUB_OUTPUT"
            else
              echo "In-season (month $m) — proceeding."
              echo "run=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Python
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: pip install -r requirements-ci.txt

      - name: Clone FPL-Core-Insights (Opta data source)
        if: steps.guard.outputs.run == 'true'
        run: git clone --depth 1 https://github.com/olbauday/FPL-Core-Insights.git

      - name: Run pipeline (FPL API -> elo player stats)
        if: steps.guard.outputs.run == 'true'
        env:
          MPLBACKEND: Agg
        run: |
          python scripts/02_fpl_api.py
          python scripts/03_fpl_elo_player.py

      - name: Commit & push updated data
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FPL_DATA/*.csv
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update FPL data ($(date -u +%Y-%m-%d))"
            git push
          fi
